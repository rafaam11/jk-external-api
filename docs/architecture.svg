<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480" font-family="'Segoe UI', 'Malgun Gothic', sans-serif" role="img" aria-label="jk-external-api 아키텍처 — packages/catalog · apps/site · apps/preview-worker">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5c6572"/>
    </marker>
  </defs>
  <rect x="0.5" y="0.5" width="959" height="479" fill="#fbfbfc" stroke="#141b27"/>

  <text x="20" y="30" font-family="Consolas, 'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5" fill="#2357a5">ARCHITECTURE · 3-PACKAGE WORKSPACE</text>

  <!-- row A -->
  <rect x="20" y="54" width="200" height="120" fill="#eef2f7" stroke="#141b27"/>
  <text x="36" y="78" font-size="14" font-weight="700" fill="#141b27">k-skill 동기화</text>
  <text x="36" y="100" font-size="11.5" fill="#5c6572">GitHub tree +</text>
  <text x="36" y="118" font-size="11.5" fill="#5c6572">SKILL.md frontmatter</text>
  <text x="36" y="136" font-size="11.5" fill="#5c6572">+ 수동 보정 병합</text>

  <rect x="250" y="54" width="210" height="120" fill="#eef2f7" stroke="#141b27"/>
  <text x="266" y="78" font-size="14" font-weight="700" fill="#141b27">packages/catalog</text>
  <text x="266" y="100" font-size="11.5" fill="#5c6572">Zod 스키마 계약</text>
  <text x="266" y="118" font-size="11.5" fill="#5c6572">큐레이션 데이터</text>
  <text x="266" y="136" font-size="11.5" fill="#5c6572">generated/skills.json</text>

  <rect x="700" y="54" width="230" height="120" fill="#eef2f7" stroke="#141b27"/>
  <text x="716" y="78" font-size="14" font-weight="700" fill="#141b27">apps/site</text>
  <text x="716" y="100" font-size="11.5" fill="#5c6572">Astro 정적 빌드</text>
  <text x="716" y="118" font-size="11.5" fill="#5c6572">@jk-external-api/catalog 번들</text>
  <text x="716" y="136" font-size="11.5" fill="#5c6572">GitHub Pages 서빙</text>

  <line x1="220" y1="114" x2="250" y2="114" stroke="#5c6572" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="235" y="104" font-size="8.5" text-anchor="middle" fill="#5c6572">sync</text>

  <line x1="460" y1="114" x2="700" y2="114" stroke="#5c6572" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="580" y="104" font-size="11.5" text-anchor="middle" fill="#2357a5">빌드 시 번들</text>
  <text x="580" y="130" font-size="9.5" text-anchor="middle" fill="#5c6572">(런타임 호출 아님)</text>

  <text x="20" y="200" font-size="11" fill="#5c6572">원자적 교체 · GitHub rate limit·잘못된 frontmatter·잘린 tree에서는 기존 스냅샷을 바꾸지 않는다.</text>

  <!-- vertical: site → worker -->
  <line x1="815" y1="174" x2="815" y2="250" stroke="#5c6572" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="825" y="205" font-size="11" fill="#2357a5">브라우저에서 선택적 GET</text>
  <text x="825" y="220" font-size="9.5" fill="#5c6572">(CORS 허용 origin만)</text>

  <!-- row B -->
  <rect x="430" y="250" width="210" height="130" fill="#eef2f7" stroke="#141b27"/>
  <text x="446" y="274" font-size="14" font-weight="700" fill="#141b27">외부 upstream</text>
  <text x="446" y="296" font-size="11.5" fill="#5c6572">data.go.kr · Kakao</text>
  <text x="446" y="314" font-size="11.5" fill="#5c6572">KOPIS</text>
  <text x="446" y="332" font-size="11.5" fill="#ba3a36">비밀키: Worker Secret에만</text>

  <rect x="700" y="250" width="230" height="130" fill="#eef2f7" stroke="#141b27"/>
  <text x="716" y="274" font-size="14" font-weight="700" fill="#141b27">apps/preview-worker</text>
  <text x="716" y="296" font-size="11.5" fill="#5c6572">Hono · 6개 어댑터</text>
  <text x="716" y="314" font-size="11.5" fill="#2357a5">5초 timeout</text>
  <text x="716" y="332" font-size="11.5" fill="#2357a5">30req/60s per IP</text>
  <text x="716" y="350" font-size="11.5" fill="#5c6572">정규화된 캐시 키</text>

  <line x1="700" y1="315" x2="640" y2="315" stroke="#5c6572" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="670" y="305" font-size="10.5" text-anchor="middle" fill="#2357a5">GET</text>

  <text x="20" y="412" font-size="11.5" fill="#5c6572">정적 콘텐츠는 Worker에 의존하지 않는다 — 실패 시 위젯 안에서만 오류 코드·재시도 가능 여부·공식 링크를 보여주고</text>
  <text x="20" y="430" font-size="11.5" fill="#5c6572">나머지 페이지는 그대로 동작한다.</text>
</svg>
