<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-label="jk-external-api 아키텍처 — packages/catalog · apps/site · apps/preview-worker">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5568"/>
    </marker>
  </defs>
  <rect width="960" height="480" rx="12" fill="#10141b" stroke="#2a3242"/>

  <!-- row A -->
  <rect x="30" y="28" width="210" height="104" rx="10" fill="#161c27" stroke="#2a3242"/>
  <text x="46" y="54" font-size="13" font-weight="700" fill="#e7ebf2">k-skill 동기화</text>
  <text x="46" y="76" font-size="10.5" fill="#8b93a3">GitHub tree +</text>
  <text x="46" y="93" font-size="10.5" fill="#8b93a3">SKILL.md frontmatter</text>
  <text x="46" y="110" font-size="10.5" fill="#8b93a3">+ 수동 보정 병합</text>

  <rect x="270" y="28" width="220" height="104" rx="10" fill="#182033" stroke="#5b9bdb"/>
  <text x="380" y="54" font-size="13" font-weight="700" fill="#5b9bdb" text-anchor="middle">packages/catalog</text>
  <text x="380" y="76" font-size="10.5" fill="#c3cad6" text-anchor="middle">Zod 스키마 계약</text>
  <text x="380" y="93" font-size="10.5" fill="#c3cad6" text-anchor="middle">큐레이션 데이터</text>
  <text x="380" y="110" font-size="10.5" fill="#c3cad6" text-anchor="middle">generated/skills.json</text>

  <rect x="710" y="28" width="220" height="104" rx="10" fill="#161c27" stroke="#2a3242"/>
  <text x="820" y="54" font-size="13" font-weight="700" fill="#e7ebf2" text-anchor="middle">apps/site</text>
  <text x="820" y="76" font-size="10.5" fill="#8b93a3" text-anchor="middle">Astro 정적 빌드</text>
  <text x="820" y="93" font-size="10.5" fill="#8b93a3" text-anchor="middle">catalog 번들</text>
  <text x="820" y="110" font-size="10.5" fill="#8b93a3" text-anchor="middle">GitHub Pages 서빙</text>

  <line x1="240" y1="80" x2="270" y2="80" stroke="#4b5568" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <line x1="490" y1="80" x2="710" y2="80" stroke="#4b5568" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="600" y="70" font-size="11" text-anchor="middle" fill="#5b9bdb">빌드 시 번들</text>
  <text x="600" y="96" font-size="9" text-anchor="middle" fill="#717b8c">(런타임 호출 아님)</text>

  <text x="30" y="160" font-size="10.5" fill="#717b8c">원자적 교체 · GitHub rate limit·잘못된 frontmatter·잘린 tree에서는 기존 스냅샷을 바꾸지 않는다.</text>

  <!-- vertical: site → worker -->
  <line x1="820" y1="132" x2="820" y2="250" stroke="#4b5568" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="832" y="185" font-size="10.5" fill="#5b9bdb">브라우저에서 선택적 GET</text>
  <text x="832" y="200" font-size="9" fill="#717b8c">(CORS 허용 origin만)</text>

  <!-- row B -->
  <rect x="440" y="250" width="210" height="130" rx="10" fill="#161c27" stroke="#2a3242"/>
  <text x="545" y="276" font-size="13" font-weight="700" fill="#e7ebf2" text-anchor="middle">외부 upstream</text>
  <text x="545" y="298" font-size="10.5" fill="#8b93a3" text-anchor="middle">data.go.kr · Kakao</text>
  <text x="545" y="315" font-size="10.5" fill="#8b93a3" text-anchor="middle">KOPIS</text>
  <text x="545" y="335" font-size="10.5" fill="#d98c8c" text-anchor="middle">비밀키: Worker Secret에만</text>

  <rect x="710" y="250" width="220" height="130" rx="10" fill="#161c27" stroke="#2a3242"/>
  <text x="820" y="276" font-size="13" font-weight="700" fill="#e7ebf2" text-anchor="middle">apps/preview-worker</text>
  <text x="820" y="298" font-size="10.5" fill="#8b93a3" text-anchor="middle">Hono · 6개 어댑터</text>
  <text x="820" y="315" font-size="10.5" fill="#5b9bdb" text-anchor="middle">5초 timeout · 30req/60s per IP</text>
  <text x="820" y="332" font-size="10.5" fill="#8b93a3" text-anchor="middle">정규화된 캐시 키</text>

  <line x1="710" y1="315" x2="650" y2="315" stroke="#4b5568" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="680" y="305" font-size="10" text-anchor="middle" fill="#8b93a3">GET</text>

  <text x="30" y="420" font-size="11" fill="#8b93a3">정적 콘텐츠는 Worker에 의존하지 않는다 — 실패 시 위젯 안에서만 오류 코드·재시도 가능 여부·공식 링크를 보여주고</text>
  <text x="30" y="438" font-size="11" fill="#8b93a3">나머지 페이지는 그대로 동작한다.</text>
</svg>
