name: Deploy preview Worker
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.28.2 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @jk-external-api/preview-worker test
      - run: pnpm --filter @jk-external-api/preview-worker build
      - name: Install Worker secrets
        working-directory: apps/preview-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KOPIS_SERVICE_KEY: ${{ secrets.KOPIS_SERVICE_KEY }}
        run: |
          jq -n --arg data "$DATA_GO_KR_API_KEY" --arg kakao "$KAKAO_REST_API_KEY" --arg kopis "$KOPIS_SERVICE_KEY" '{DATA_GO_KR_API_KEY:$data,KAKAO_REST_API_KEY:$kakao,KOPIS_SERVICE_KEY:$kopis}' > "$RUNNER_TEMP/worker-secrets.json"
          pnpm exec wrangler secret bulk "$RUNNER_TEMP/worker-secrets.json" --env production
          rm "$RUNNER_TEMP/worker-secrets.json"
      - name: Deploy approved production Worker
        working-directory: apps/preview-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --env production
